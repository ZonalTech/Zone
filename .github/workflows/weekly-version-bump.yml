name: Weekly version bump

# Once a week, combine all commits since the last release into a single patch
# bump (1.0.0 -> 1.0.1 -> ...). Manual runs are allowed via "Run workflow".
on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays, 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write          # needed to push the release commit + tag

concurrency:
  group: weekly-version-bump
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history so we can diff since the last tag

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Combine the week's commits and bump the patch version
        id: bump
        run: python .github/scripts/weekly_bump.py

      - name: Push release commit + tag
        if: steps.bump.outputs.bumped == 'true'
        run: git push --follow-tags origin HEAD
